name: CI Pipeline

# =============================================================================
# WORKFLOW CONFIG
# -----------------------------------------------------------------------------
# PLUGIN_NAME  — human-readable plugin name used for artifacts & releases.
# JAVA_VERSION — JDK version used for build and analysis.
# JAVA_DIST    — JDK distribution.
# =============================================================================
env:
  PLUGIN_NAME: PermGuard
  JAVA_VERSION: '17'
  JAVA_DIST: 'temurin'

# =============================================================================
# Security model for GitHub Actions: action versioning & runner egress
#
# RATIONALE
# ---------
# This is an open-source project maintained by a single developer.
# Threat model (for CI / GitHub Actions specifically):
# - Third-party GitHub Actions and build tools may eventually be compromised.
# - There is no capacity to manually review SHA-pinned action diffs on every
#   update.
# - Therefore, the primary defence against malicious GitHub Actions is
#   runtime monitoring and egress control on the runner, not version pinning.
#
# ACTION VERSIONING
# -----------------
# All third-party actions are referenced using @main / @master or the latest
# convenient semver tag. We do NOT treat tag pinning as a strong security
# control in this repository.
#
# SHA pinning is intentionally NOT used:
# - It only provides strong guarantees when combined with manual review of
#   every upstream commit, which this project cannot sustain.
# - Without that review discipline, SHA pins can still point to malicious
#   code that was present before the pin was taken, and they add maintenance
#   overhead without realistic benefit here.
#
# Semver/tag pinning is also NOT enforced as a primary control:
# - Tags on GitHub are mutable; recent supply-chain incidents (e.g. compromised
#   actions overwriting historical tags) have shown that tag pinning alone does
#   not reliably prevent malicious updates.
#
# Primary CI / GitHub Actions supply-chain controls:
# - step-security/harden-runner is used in every job to protect the CI runner:
#   * monitors outbound network, file, and process activity at runtime;
#   * enforces a Global Block List of known-malicious endpoints maintained
#     by StepSecurity's SOC;
#   * supports per-job egress allowlists in block mode to limit exfiltration
#     impact if an action or dependency is compromised.
#
# EGRESS POLICY (step-security/harden-runner)
# ------------------------------------------
# High-risk jobs (write permissions / secrets / CD & publishing):
# - egress-policy: block with an explicit allowed-endpoints allowlist.
#   Rationale: limits the blast radius if an action or dependency is
#   compromised and tries to exfiltrate data.
#
# Low-risk jobs (read-only, no secrets):
# - egress-policy: audit.
#   Rationale: scanning tools may legitimately contact varying endpoints
#   across versions; strict blocking would require frequent maintenance
#   for little benefit when no sensitive credentials are present.
#
# See Harden-Runner docs:
#   https://docs.stepsecurity.io/harden-runner
# =============================================================================

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  lint-actions:
    name: 🧹 Lint Actions
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Actionlint (Reviewdog)
        uses: step-security/action-actionlint@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          fail_on_error: true
          level: any
          filter_mode: nofilter

  lint-renovate:
    name: 🧹 Lint Renovate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: latest

      - name: Setup Socket Firewall
        uses: socketdev/action@main
        with:
          mode: firewall-free

      - name: Validate Renovate Config via Socket Firewall
        run: |
          sfw bunx --package renovate renovate-config-validator --strict

  lint-links:
    name: 🧹 Lint Links
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Lint Links
        uses: umbrelladocs/action-linkspector@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          fail_level: error

  lint-markdown:
    name: 🧹 Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@main
        with:
          globs: '**/*.md'
          config: '.markdownlint.jsonc'

  security-scan:
    name: 🔐 Security Scan CodeQL
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DIST }})
        uses: actions/setup-java@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@main

      - name: Build for CodeQL
        run: ./gradlew build -x test

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-semgrep:
    name: 🔐 Security Scan Semgrep
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@main
        with:
          python-version: '3.x'

      - name: Setup Socket Firewall
        uses: socketdev/action@main
        with:
          mode: firewall-free

      - name: Install Semgrep via Socket Firewall
        run: sfw pip install semgrep

      - name: Setup Semgrep Pro Engine via Socket Firewall
        run: sfw semgrep install-semgrep-pro

      - name: Run Semgrep
        run: |
          semgrep scan \
            --pro \
            --config auto \
            --config "p/java" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --config "p/github-actions" \
            --config "p/supply-chain" \
            --exclude-rule "yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag" \
            --exclude "**/build/**" \
            --exclude "**/.gradle/**" \
            --exclude "**/test/**" \
            --sarif --output semgrep.sarif \
            --error

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  security-scan-snyk:
    name: 🔐 Security Scan Snyk (push)
    runs-on: ubuntu-latest

    # Skip security scan Snyk for PR (for PR we connect GitHub App integration Snyk)
    if: github.event_name == 'push'

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DIST }})
        uses: actions/setup-java@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@main

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/gradle-9-jdk17@main
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: /opt/java/openjdk # Enforce directory expected by the Snyk container
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'snyk.sarif'

  security-scan-trivy:
    name: 🔐 Security Scan Trivy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'

      - name: Run Trivy (console report)
        if: failure()
        run: |
          echo "==== Trivy console report ===="
          trivy fs .

      - name: Upload Trivy scan results to GitHub Security tab
        # Fix condition to work for both push and PR (excluding forks)
        if: |
          always() &&
          (github.event_name == 'push' || 
           (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  security-scan-osv-pr:
    name: 🔐 Security Scan OSV (PR)
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-osv-push:
    name: 🔐 Security Scan OSV (push)
    if: ${{ github.event_name == 'push' }}

    permissions:
      contents: read
      actions: read
      security-events: write

    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      fail-on-vuln: true
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./

  security-scan-zizmor:
    name: 🔐 GitHub Actions Security (zizmor)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: 🧩 Dependency Review (PR)
    runs-on: ubuntu-latest

    # Skip Dependency Review for push
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@main
        with:
          fail-on-severity: high

  secrets-scan-trufflehog:
    name: 🔑 Secrets Scan TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false
          fetch-depth: 0  # Required for diff scan

      - name: TruffleHog Secrets Scan (full)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

      - name: TruffleHog Secrets Scan (diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

  build-pr:
    name: 🏗️ Build Plugin (PR)
    if: github.event_name == 'pull_request'
    needs: [
      lint-actions,
      lint-renovate,
      lint-links,
      lint-markdown,
      security-scan,
      security-scan-semgrep,
      security-scan-trivy,
      security-scan-osv-pr,
      security-scan-zizmor,
      secrets-scan-trufflehog,
      dependency-review
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DIST }})
        uses: actions/setup-java@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@main

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Upload artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ${{ github.workspace }}/build/libs/

  build-push:
    name: 🏗️ Build Plugin (push)
    if: github.event_name == 'push'
    needs: [
      lint-actions,
      lint-renovate,
      lint-links,
      lint-markdown,
      security-scan,
      security-scan-semgrep,
      security-scan-snyk,
      security-scan-trivy,
      security-scan-osv-push,
      security-scan-zizmor,
      secrets-scan-trufflehog
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DIST }})
        uses: actions/setup-java@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@main

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Upload artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ${{ github.workspace }}/build/libs/
